# Docker image build and publish for the Lucoze marketing website.
#
# TRIGGER: GitHub Release published in this repo.
#   uat-vX.Y.Z  →  UAT build   → svasamm/lucoze-website:uat-vX.Y.Z + :uat-latest  → UAT deploy
#   vX.Y.Z      →  Prod build  → svasamm/lucoze-website:vX.Y.Z + :latest           → Production deploy (approval gate)
#
# Can also be triggered manually via workflow_dispatch for infra rebuilds.
#
# Flow:
#   Create GitHub Release tagged uat-v1.0.0
#     → builds uat-v1.0.0 + uat-latest tags
#       → triggers Dokploy webhook for UAT site
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME              Docker Hub username
#   DOCKERHUB_TOKEN                 Docker Hub token (read+write)
#   DOKPLOY_LUCOZE_WEBSITE_WEBHOOK      Dokploy deploy webhook for production
#   DOKPLOY_LUCOZE_WEBSITE_UAT_WEBHOOK  Dokploy deploy webhook for UAT
#
# Required GitHub Variables:
#   DOKPLOY_DEPLOY_ENABLED          set to "true" to enable auto-deploy after build

name: Build & Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. uat-v1.0.0 or v1.0.0). Defaults to 'uat-latest' for manual infra rebuilds."
        required: false
        default: "uat-latest"
        type: string

jobs:
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      is_uat: ${{ steps.meta.outputs.is_uat }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version and environment
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${RELEASE_TAG:-$INPUT_VERSION}"

          if echo "$VERSION" | grep -q "^uat-"; then
            FLOATING_TAG="uat-latest"
            IS_UAT="true"
          else
            FLOATING_TAG="latest"
            IS_UAT="false"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "floating_tag=${FLOATING_TAG}" >> "$GITHUB_OUTPUT"
          echo "is_uat=${IS_UAT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            svasamm/lucoze-website:${{ steps.meta.outputs.version }}
            svasamm/lucoze-website:${{ steps.meta.outputs.floating_tag }}
          cache-from: type=gha,key=lucoze-website-${{ steps.meta.outputs.floating_tag }}
          cache-to: type=gha,mode=max,key=lucoze-website-${{ steps.meta.outputs.floating_tag }}

      - name: Job summary
        run: |
          echo "### Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version tag:** \`svasamm/lucoze-website:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Floating tag:** \`svasamm/lucoze-website:${{ steps.meta.outputs.floating_tag }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-uat:
    name: Deploy to UAT
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.is_uat == 'true' && vars.DOKPLOY_DEPLOY_ENABLED == 'true'
    environment: uat

    steps:
      - name: Trigger Dokploy redeploy
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_LUCOZE_WEBSITE_UAT_WEBHOOK }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_LUCOZE_WEBSITE_UAT_WEBHOOK not set — skipping deploy."
            exit 0
          fi

          echo "Deploying to UAT..."
          echo "Image: $IMAGE_TAG"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" -H "Content-Type: application/json")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "Webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Deploy summary
        if: always()
        run: |
          echo "### UAT Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: \`${{ needs.build.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Site**: lucoze-website UAT" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.is_uat == 'false' && vars.DOKPLOY_DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Trigger Dokploy redeploy
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_LUCOZE_WEBSITE_WEBHOOK }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_LUCOZE_WEBSITE_WEBHOOK not set — skipping deploy."
            exit 0
          fi

          echo "Deploying to production..."
          echo "Image: $IMAGE_TAG"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" -H "Content-Type: application/json")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "Webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Deploy summary
        if: always()
        run: |
          echo "### Production Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: \`${{ needs.build.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Site**: lucoze-website Production" >> "$GITHUB_STEP_SUMMARY"
