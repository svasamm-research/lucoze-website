name: Build & Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 1.0.0)"
        required: true
        type: string
  repository_dispatch:
    types: [build-publish]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          VERSION="${INPUT_VERSION:-$PAYLOAD_VERSION}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            svasamm/lucoze-website:${{ steps.version.outputs.tag }}
            svasamm/lucoze-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "### Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`svasamm/lucoze-website:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest:** \`svasamm/lucoze-website:latest\`" >> $GITHUB_STEP_SUMMARY
